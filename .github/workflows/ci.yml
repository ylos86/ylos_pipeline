# CI Ylos Pipeline — suite unittest stdlib, sans aucune dependance (pas de pip install,
# coherent avec le principe "stdlib privilegiee" du repo). Runner Linux : fcntl y existe,
# pas besoin de macOS pour ces tests.
#
# Matrice Python calee sur les interpreteurs reels du pipeline :
#   3.9  = Python systeme macOS (fait tourner ylos_ui.py aujourd'hui)
#   3.11 = generation Blender 4.2 LTS / hython recents
#   3.13 = Python embarque Blender actuel (cf. __pycache__ cpython-313 de l'addon)
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite
        run: python -m unittest discover -s tests -v
